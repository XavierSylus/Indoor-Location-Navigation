# Phase 2: 扩展 BSSID 词表到 2000
# 基于 baseline_config.yml，仅修改 n_bssid 和缓存/模型输出路径

seed: 42

paths:
  train_dir: "indoor-location-navigation/train"
  test_dir: "indoor-location-navigation/test"
  cache_dir: "data_processing/processed_2k"      # 独立缓存目录，不覆盖 800 版本
  model_dir: "models/perfloor_k20_2k"            # 独立模型目录
  sample_sub: "indoor-location-navigation/sample_submission.csv"

features:
  n_bssid: 2000      # 从 800 扩展到 2000
  window_ms: 5000

model_params:
  regressor:
    objective: "rmse"
    metric: "rmse"
    learning_rate: 0.1
    num_leaves: 63
    max_depth: 8
    feature_fraction: 0.8
    bagging_fraction: 0.8
    bagging_freq: 5
    seed: 42
    n_jobs: -1
    verbose: -1

  classifier:
    objective: "multiclass"
    metric: "multi_error"
    learning_rate: 0.1
    num_leaves: 31
    max_depth: 6
    feature_fraction: 0.8
    seed: 42
    n_jobs: -1
    verbose: -1

training:
  num_boost_round: 500
  early_stopping_rounds: 20

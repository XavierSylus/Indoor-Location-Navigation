{
  "version": "v007_candidate_transition_lattice",
  "experiment_type": "cv_probe",
  "iteration_mode": "add_module",
  "random_seed": 42,
  "diagnostic_only": true,
  "inputs": {
    "candidate_dataset": "data_processing/processed/hard_site_candidate_rerank_dataset.csv",
    "v3_delta_predictions": "data_processing/processed/v3_all_train_delta.csv"
  },
  "outputs": {
    "selections": "data_processing/processed/candidate_transition_lattice_selections.csv",
    "summary": "data_processing/processed/candidate_transition_lattice_summary.json"
  },
  "reranker": {
    "feature_set": "geometry_source_wifi",
    "target": "label_log1p_distance_m",
    "model_type": "lgbm",
    "num_leaves": 7,
    "min_child_samples": 20,
    "learning_rate": 0.05,
    "n_estimators": 300,
    "reg_alpha": 1.0,
    "reg_lambda": 5.0,
    "subsample": 0.8,
    "colsample_bytree": 0.8
  },
  "transition": {
    "alpha_grid": [0.0, 0.1, 0.25, 0.5, 1.0, 2.0, 4.0],
    "pairwise_cap_m": 10.0,
    "require_exact_v3_chain": true,
    "calibration": "leave_one_path_out"
  },
  "success_gate": {
    "baseline_mae_m": 7.524908431950882,
    "target_mae_m": 5.5,
    "minimum_excess_over_4m_reduction_ratio": 0.25
  },
  "leakage_boundary": {
    "submission_safe": false,
    "reason": "Existing V3 checkpoint used leg-level random splitting, so held-out paths may have contributed training legs.",
    "forbidden_transition_columns": [
      "gt_delta_x",
      "gt_delta_y",
      "gt_x",
      "gt_y",
      "label_distance_m",
      "group_oracle_distance_at_topk"
    ]
  }
}
